apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-backend
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: api
        image: marcusedemarchi/bilheteria-park-back:1.0
        ports:
        - containerPort: 8000
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10

        env:
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: db-credentials-secret
                key: username
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-credentials-secret
                key: password
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: db-credentials-secret
                key: host
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: db-credentials-secret
                key: dbname
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: aws-credentials
                key: access_key_id
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: aws-credentials
                key: secret_access_key

          - name: AWS_SESSION_TOKEN
            valueFrom:
              secretKeyRef:
                name: aws-credentials
                key: session_token
          
          - name: DATABASE_URL
            value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):5432/$(DB_NAME)"
            
          - name: AWS_SQS_QUEUE_URL
            value: "https://sqs.us-east-1.amazonaws.com/992382528010/k3s-app-queue"

          - name: REDIS_URL
            value: "k3s-redis.zpnhxn.0001.use1.cache.amazonaws.com"

          - name: ADMIN_USERNAME
            value: "admin"

          - name: ADMIN_PASSWORD
            value: "teste123"
          
          - name: LOG_LEVEL
            value: "INFO"

          - name: AWS_REGION
            value: "us-east-1"

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.tls: "false"
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /docs
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
      - path: /openapi.json
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
